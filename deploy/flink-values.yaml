apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: graphrag-ingestion
  namespace: graphrag
spec:
  flinkVersion: v1_19
#  image: flink:1.20.0-scala_2.12-java11
#  image: flink:1.19.1-scala_2.12-java11
  image: simbajc29/graphrag-flink:1.19-java17
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
  serviceAccount: flink
  job:
#    jarURI: s3://retrieval-index-chinomona/jarFiles/graphrag-ingestion-assembly-0.1.0-SNAPSHOT.jar
    jarURI: local:///opt/flink/usrlib/graphrag-ingestion-assembly-0.1.0-SNAPSHOT.jar
    entryClass: ingestion.IngestionModule
    args:
      - "--mode"
      - "full"
      - "--config"
      - "/etc/job-config/application.conf"
    parallelism: 2
    upgradeMode: stateless
  jobManager:
    resource:
      memory: "1024m"
      cpu: 1
  taskManager:
    resource:
      memory: "2048m"
      cpu: 1
