apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-db
  labels:
    app: neo4j-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-db
  template:
    metadata:
      labels:
        app: neo4j-db
    spec:
      enableServiceLinks: false          # <<< ADD THIS LINE
      containers:
        - name: neo4j
          image: neo4j:5.25.1-community
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
          ports:
            - containerPort: 7474   # HTTP
            - containerPort: 7687   # Bolt
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-db
  labels:
    app: neo4j-db
spec:
  selector:
    app: neo4j-db
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  type: ClusterIP
