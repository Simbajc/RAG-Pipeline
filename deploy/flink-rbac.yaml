apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
  namespace: graphrag
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "services", "configmaps", "endpoints"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create","update","patch","get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-rolebinding
  namespace: graphrag
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: graphrag
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io
